plugins {
    id 'java'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.seleniumhq.selenium:selenium-java:4.33.0'
    implementation 'org.testng:testng:7.11.0'
    implementation 'com.aventstack:extentreports:5.1.2'
    implementation 'org.apache.logging.log4j:log4j-core:2.25.3'
    implementation 'org.apache.logging.log4j:log4j-api:2.25.3'

    implementation 'org.apache.poi:poi:5.5.1'
    implementation 'org.apache.poi:poi-ooxml:5.2.5'

    implementation 'io.appium:java-client:9.4.0'
}

compileJava.options.encoding = 'UTF-8'

tasks.withType(JavaCompile){
    options.encoding = 'UTF-8'
}

test {
    useTestNG(){
        useDefaultListeners = true // khai báo sử dụng TestNG
        outputDirectory = file("$projectDir/test-output") // chỉ định thư mục đầu ra cho report kết quả kiểm thử
    }
}